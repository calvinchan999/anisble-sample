---
# ============================================================
# site.yml – Full stack deployment (runs on EVERY VM)
#
# Each VM gets the full stack:
#   - MySQL        (installed on host, port 3306)
#   - Backend      (Docker container, port 3000)
#   - Frontend     (Docker container, port 80)
#
# The frontend talks to the backend on the SAME VM (localhost).
#
# Run: ansible-playbook site.yml
# ============================================================

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PLAY 1 – Install SQL Server on every VM
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- name: "PLAY 1 | Install SQL Server on all VMs"
  hosts: all_vms

  vars:
    db_name: appdb
    db_user: appuser
    db_pass: apppass
    sa_pass: "SqlServer@2026!"    # SA password – must meet complexity requirements

  tasks:

    - name: Update apt cache and install prerequisites
      ansible.builtin.apt:
        name: [curl, apt-transport-https, gnupg2]
        state: present
        update_cache: true

    - name: Install OpenLDAP library and create symlinks for SQL Server
      ansible.builtin.shell: |
        set -e
        LIB_DIR=/usr/lib/x86_64-linux-gnu

        # Install whichever libldap package is available
        apt-get install -y libldap-common 2>/dev/null || true
        apt-cache search libldap | head -5
        PKG=$(dpkg -l 'libldap*' 2>/dev/null | awk '/^ii/{print $2}' | head -1)
        if [ -z "$PKG" ]; then
          # Force install via pattern
          apt-get install -y $(apt-cache pkgnames libldap | head -1) || true
        fi

        echo "=== All liblber/libldap files ==="
        find /usr/lib -name 'liblber*' -o -name 'libldap*' 2>/dev/null || true

        # Create symlinks – search broadly for any liblber/libldap .so file
        LBER=$(find /usr/lib -name 'liblber*.so*' -type f -o -name 'liblber*.so*' -type l 2>/dev/null | head -1)
        LDAP=$(find /usr/lib -name 'libldap*.so*' -type f -o -name 'libldap*.so*' -type l 2>/dev/null | head -1)

        echo "Found LBER: $LBER"
        echo "Found LDAP: $LDAP"

        if [ -n "$LBER" ]; then
          ln -sf "$LBER" $LIB_DIR/liblber-2.5.so.0
        else
          echo "WARNING: No liblber found, SQL Server may fail to start"
        fi
        if [ -n "$LDAP" ]; then
          ln -sf "$LDAP" $LIB_DIR/libldap-2.5.so.0
        else
          echo "WARNING: No libldap found, SQL Server may fail to start"
        fi
        ldconfig
      register: ldap_result
      changed_when: true

    - name: Show OpenLDAP library detection output
      ansible.builtin.debug:
        msg: "{{ ldap_result.stdout_lines }}"

    - name: Add Microsoft repository key
      ansible.builtin.shell: >
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc
        | gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
      args:
        creates: /usr/share/keyrings/microsoft-prod.gpg

    - name: Add Microsoft SQL Server repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/24.04/mssql-server-2025 noble main"
        state: present
        filename: mssql-server

    - name: Add Microsoft tools repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/24.04/prod noble main"
        state: present
        filename: mssql-tools

    - name: Install SQL Server
      ansible.builtin.package:
        name: mssql-server
        state: present

    - name: Install sqlcmd (mssql-tools18)
      ansible.builtin.shell: ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
      environment:
        DEBIAN_FRONTEND: noninteractive
      changed_when: true

    # Write mssql.conf directly – sets edition to Developer
    # This avoids mssql-conf setup which tries to start the service itself
    - name: Create /var/opt/mssql directory
      ansible.builtin.file:
        path: /var/opt/mssql
        state: directory
        owner: mssql
        group: mssql
        mode: "0700"

    - name: Write mssql.conf (sets Developer edition)
      ansible.builtin.copy:
        dest: /var/opt/mssql/mssql.conf
        owner: mssql
        group: mssql
        mode: "0600"
        content: |
          [EULA]
          accepteula = Y

          [sqlagent]
          enabled = false

    # Pass SA password via systemd environment override
    # so it is set before SQL Server starts for the first time
    - name: Create systemd override directory for mssql-server
      ansible.builtin.file:
        path: /etc/systemd/system/mssql-server.service.d
        state: directory
        mode: "0755"

    - name: Write systemd environment override (SA password + edition)
      ansible.builtin.copy:
        dest: /etc/systemd/system/mssql-server.service.d/override.conf
        mode: "0644"
        content: |
          [Service]
          Environment=MSSQL_SA_PASSWORD={{ sa_pass }}
          Environment=MSSQL_PID=Developer
          Environment=ACCEPT_EULA=Y

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start and enable SQL Server
      ansible.builtin.service:
        name: mssql-server
        state: started
        enabled: true

    # Show journal log immediately – helps diagnose startup failures
    - name: Capture SQL Server journal log
      ansible.builtin.command: journalctl -u mssql-server --no-pager -n 50
      register: mssql_journal
      changed_when: false
      failed_when: false

    - name: Show SQL Server journal log
      ansible.builtin.debug:
        msg: "{{ mssql_journal.stdout_lines }}"

    - name: Wait for SQL Server to be ready (port 1433)
      ansible.builtin.wait_for:
        port: 1433
        delay: 10
        timeout: 90

    - name: Render init.sql from template
      ansible.builtin.template:
        src: templates/init.sql.j2
        dest: /tmp/init.sql
        mode: "0600"

    - name: Run init.sql (creates DB, login, user, seed data)
      ansible.builtin.shell: /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P '{{ sa_pass }}' -C -i /tmp/init.sql
      changed_when: false


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PLAY 2 – Build images + start all containers via docker compose
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- name: "PLAY 2 | Deploy containers on all VMs"
  hosts: all_vms

  vars:
    db_name: appdb
    db_user: appuser
    db_pass: apppass
    sa_pass: "SqlServer@2026!"    # must match PLAY 1
    backend_port: 3000
    frontend_port: 80
    compose_dir: /opt/compose
    backend_build_dir: /opt/backend
    frontend_build_dir: /opt/frontend

  tasks:

    # ── Docker setup ─────────────────────────────────────────
    - name: Install Docker
      ansible.builtin.package:
        name: docker.io
        state: present

    - name: Install docker-compose plugin (Ubuntu)
      ansible.builtin.package:
        name: docker-compose-v2
        state: present

    - name: Load kernel modules required by Docker
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Apply sysctl settings required by Docker
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }

    # Ubuntu 24.04 defaults to nftables; docker.io requires iptables-legacy
    - name: Install iptables
      ansible.builtin.apt:
        name: iptables
        state: present

    - name: Switch iptables to legacy mode
      ansible.builtin.command: update-alternatives --set iptables /usr/sbin/iptables-legacy
      changed_when: false
      failed_when: false

    - name: Start and enable Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Capture Docker journal log (diagnose startup failures)
      ansible.builtin.command: journalctl -u docker --no-pager -n 30
      register: docker_journal
      changed_when: false
      failed_when: false

    - name: Show Docker journal log
      ansible.builtin.debug:
        msg: "{{ docker_journal.stdout_lines }}"

    - name: Add ansible user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    # ── Build backend image ──────────────────────────────────
    - name: Upload backend source to VM
      ansible.builtin.copy:
        src: backend/
        dest: "{{ backend_build_dir }}/"
        mode: "0644"

    - name: Build backend Docker image
      ansible.builtin.command: docker build -t backend:latest {{ backend_build_dir }}
      changed_when: true

    # ── Build frontend image ─────────────────────────────────
    - name: Upload frontend source to VM
      ansible.builtin.copy:
        src: frontend/
        dest: "{{ frontend_build_dir }}/"
        mode: "0644"

    - name: Render config.js (injects backend IP)
      ansible.builtin.template:
        src: templates/frontend_config.js.j2
        dest: "{{ frontend_build_dir }}/config.js"
        mode: "0644"

    - name: Build frontend Docker image
      ansible.builtin.command: docker build -t frontend:latest {{ frontend_build_dir }}
      changed_when: true

    # ── Deploy with docker compose ───────────────────────────
    - name: Create compose directory
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        mode: "0755"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: templates/compose.yml.j2
        dest: "{{ compose_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Start all containers with docker compose
      ansible.builtin.command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ compose_dir }}"
      changed_when: true

    - name: Wait 5 seconds for containers to initialize
      ansible.builtin.pause:
        seconds: 5

    - name: Show backend container logs (diagnostic)
      ansible.builtin.command: docker logs backend --tail 20
      register: backend_logs
      changed_when: false
      failed_when: false

    - name: Print backend logs
      ansible.builtin.debug:
        msg: "{{ backend_logs.stdout_lines + backend_logs.stderr_lines }}"

    # ── Health checks ────────────────────────────────────────
    - name: Wait for backend to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ backend_port }}/api/health"
        status_code: 200
      register: health
      retries: 10
      delay: 3
      until: health.status == 200

    - name: Wait for frontend to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ frontend_port }}"
        status_code: 200
      register: fe_check
      retries: 10
      delay: 3
      until: fe_check.status == 200

    - name: Print access URL
      ansible.builtin.debug:
        msg:
          - "========================================"
          - " Deployment complete on {{ inventory_hostname }}!"
          - " Open → http://{{ ansible_host }}:{{ frontend_port }}"
          - "========================================"


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PLAY 3 – Deploy Nginx failover load balancer on vm0
#
# vm0 acts as the single entry point.
# Traffic goes to vm1 (primary); if vm1 is unreachable,
# Nginx automatically fails over to vm2 (backup).
# Nginx runs as a Docker container (nginx:stable-alpine) via
# docker compose – consistent with the rest of the stack.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- name: "PLAY 3 | Deploy Nginx failover load balancer on vm0 (Docker)"
  hosts: load_balancer

  vars:
    frontend_port: 80
    lb_compose_dir: /opt/nginx-lb

  tasks:

    # ── Docker setup ─────────────────────────────────────────
    - name: Install Docker
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Install docker-compose plugin (Ubuntu)
      ansible.builtin.package:
        name: docker-compose-v2
        state: present

    - name: Load kernel modules required by Docker
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Apply sysctl settings required by Docker
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }

    # Ubuntu 24.04 defaults to nftables; docker.io requires iptables-legacy
    - name: Install iptables
      ansible.builtin.apt:
        name: iptables
        state: present

    - name: Switch iptables to legacy mode
      ansible.builtin.command: update-alternatives --set iptables /usr/sbin/iptables-legacy
      changed_when: false
      failed_when: false

    # Clean up stale socket/unit state left by previous failed installs
    - name: Reset any failed systemd units
      ansible.builtin.command: systemctl reset-failed
      changed_when: false
      failed_when: false

    - name: Remove stale Docker socket file if present
      ansible.builtin.file:
        path: /var/run/docker.sock
        state: absent

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start and enable Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Capture Docker journal log (diagnose startup failures)
      ansible.builtin.command: journalctl -u docker --no-pager -n 30
      register: docker_journal
      changed_when: false
      failed_when: false

    - name: Show Docker journal log
      ansible.builtin.debug:
        msg: "{{ docker_journal.stdout_lines }}"

    - name: Add ansible user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    # ── Deploy Nginx via docker compose ──────────────────────
    - name: Create lb compose directory
      ansible.builtin.file:
        path: "{{ lb_compose_dir }}"
        state: directory
        mode: "0755"

    - name: Render Nginx failover config
      ansible.builtin.template:
        src: templates/nginx_lb.conf.j2
        dest: "{{ lb_compose_dir }}/lb.conf"
        mode: "0644"

    - name: Render docker-compose.yml for nginx-lb
      ansible.builtin.template:
        src: templates/nginx_lb_compose.yml.j2
        dest: "{{ lb_compose_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Start nginx-lb container with docker compose
      ansible.builtin.command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ lb_compose_dir }}"
      changed_when: true

    - name: Wait for Nginx LB to be ready (port 80)
      ansible.builtin.wait_for:
        port: 80
        delay: 3
        timeout: 30

    - name: Print load balancer URL
      ansible.builtin.debug:
        msg:
          - "========================================"
          - " Nginx failover LB ready on {{ inventory_hostname }}!"
          - " Entry point → http://{{ ansible_host }}"
          - " Primary      → vm1 ({{ hostvars['vm1']['ansible_host'] }}:{{ frontend_port }})"
          - " Failover     → vm2 ({{ hostvars['vm2']['ansible_host'] }}:{{ frontend_port }})"
          - "========================================"

