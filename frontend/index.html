<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ansible Demo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 40px 20px; }
    h1 { color: #89b4fa; margin-bottom: 6px; }
    p.sub { color: #6c7086; margin-bottom: 30px; font-size: 0.9rem; }
    .grid { display: flex; gap: 20px; flex-wrap: wrap; }
    .card {
      background: #313244; border-radius: 10px; padding: 24px 28px;
      flex: 1; min-width: 260px; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .card h2 { font-size: 1rem; color: #a6adc8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 8px 0; border-bottom: 1px solid #45475a; font-size: 0.9rem; }
    td:first-child { color: #a6adc8; width: 45%; }
    td:last-child { color: #cba6f7; font-weight: bold; word-break: break-all; }
    tr:last-child td { border-bottom: none; }
    .badge { display:inline-block; padding: 2px 10px; border-radius: 999px; font-size:0.75rem; font-weight:bold; }
    .ok { background:#a6e3a1; color:#1e1e2e; }
    .err { background:#f38ba8; color:#1e1e2e; }
    #users { margin-top: 16px; }
    #users li { padding: 6px 0; border-bottom: 1px solid #45475a; font-size:0.9rem; color: #cdd6f4; }
    #users li:last-child { border-bottom:none; }
    #error { color: #f38ba8; font-size: 0.85rem; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Ansible Demo App</h1>
  <p class="sub">Frontend on VM1 &nbsp;→&nbsp; Backend API on VM2 &nbsp;→&nbsp; MySQL on VM2 host</p>

  <div class="grid">

    <!-- Backend health card -->
    <div class="card">
      <h2>Backend Health</h2>
      <table id="health-table">
        <tr><td>Status</td><td><span id="status">loading…</span></td></tr>
        <tr><td>Backend host</td><td id="host">–</td></tr>
        <tr><td>Message</td><td id="msg">–</td></tr>
      </table>
    </div>

    <!-- Users from DB card -->
    <div class="card">
      <h2>Users from MySQL</h2>
      <ul id="users"><li>loading…</li></ul>
      <div id="error"></div>
    </div>

  </div>

  <!-- config.js is generated by Ansible (injects BACKEND_URL) -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
