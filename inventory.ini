# ============================================================
# inventory.ini – tell Ansible which servers to connect to
#
# Change the IP addresses and password to match your VMs
# ============================================================

# Both VMs run the full stack: MySQL + Backend + Frontend
[all_vms]
vm1 ansible_host=192.168.1.10 ansible_user=ansible ansible_ssh_pass=your_password ansible_become_pass=your_password
vm2 ansible_host=192.168.1.11 ansible_user=ansible ansible_ssh_pass=your_password ansible_become_pass=your_password

