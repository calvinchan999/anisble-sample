# ============================================================
# inventory.ini – tell Ansible which servers to connect to
#
# Change the IP addresses and password to match your VMs
# ============================================================

# Both VMs run the full stack: MySQL + Backend + Frontend
[all_vms]
vm1 ansible_host=192.168.81.136 ansible_user=test ansible_ssh_pass=test ansible_become_pass=test
vm2 ansible_host=192.168.81.137 ansible_user=test ansible_ssh_pass=test ansible_become_pass=test

# Nginx load balancer / failover node – update ansible_host to match your vm0 IP
[load_balancer]
vm0 ansible_host=192.168.81.138 ansible_user=test ansible_ssh_pass=test ansible_become_pass=test
