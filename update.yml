---
# ============================================================
# update.yml – Update frontend or backend independently
#
# Usage:
#   Update frontend only:
#     ansible-playbook update.yml --tags frontend
#
#   Update backend only:
#     ansible-playbook update.yml --tags backend
#
#   Update both:
#     ansible-playbook update.yml --tags frontend,backend
#
# What it does:
#   - Uploads the latest source code to all VMs
#   - Rebuilds the Docker image
#   - Replaces the running container (zero config change needed)
# ============================================================

# Shared vars anchor – both plays need all vars because they share compose.yml.j2
x-vars: &shared_vars
  db_name: appdb
  db_user: appuser
  db_pass: apppass
  backend_port: 3000
  frontend_port: 80
  backend_host: "127.0.0.1"
  compose_dir: /opt/compose
  app_version: "{{ new_version | default('latest') }}"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Frontend update
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- name: "UPDATE | Frontend"
  hosts: all_vms
  tags: frontend

  vars:
    <<: *shared_vars
    build_dir: /opt/frontend

  tasks:

    - name: Upload latest frontend source
      ansible.builtin.copy:
        src: frontend/
        dest: "{{ build_dir }}/"
        mode: "0644"

    - name: Render config.js
      ansible.builtin.template:
        src: templates/frontend_config.js.j2
        dest: "{{ build_dir }}/config.js"
        mode: "0644"

    - name: Build new frontend image (tagged with version)
      ansible.builtin.command: >
        docker build -t frontend:{{ app_version }} -t frontend:latest {{ build_dir }}
      changed_when: true

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: templates/compose.yml.j2
        dest: "{{ compose_dir }}/docker-compose.yml"
        mode: "0644"

    # Only restart the frontend service, leave backend untouched
    - name: Restart frontend service
      ansible.builtin.command: docker compose up -d --pull never --remove-orphans frontend
      args:
        chdir: "{{ compose_dir }}"
      changed_when: true

    - name: Wait for frontend to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ frontend_port }}"
        status_code: 200
      register: fe_check
      retries: 10
      delay: 3
      until: fe_check.status == 200

    - name: Confirm frontend update
      ansible.builtin.debug:
        msg: "Frontend updated to {{ app_version }} on {{ inventory_hostname }} ✓"


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Backend update
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- name: "UPDATE | Backend"
  hosts: all_vms
  tags: backend

  vars:
    <<: *shared_vars
    build_dir: /opt/backend

  tasks:

    - name: Upload latest backend source
      ansible.builtin.copy:
        src: backend/
        dest: "{{ build_dir }}/"
        mode: "0644"

    - name: Build new backend image (tagged with version)
      ansible.builtin.command: >
        docker build -t backend:{{ app_version }} -t backend:latest {{ build_dir }}
      changed_when: true

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: templates/compose.yml.j2
        dest: "{{ compose_dir }}/docker-compose.yml"
        mode: "0644"

    # Only restart the backend service, leave frontend untouched
    - name: Restart backend service
      ansible.builtin.command: docker compose up -d --pull never --remove-orphans backend
      args:
        chdir: "{{ compose_dir }}"
      changed_when: true

    - name: Wait for backend to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ backend_port }}/api/health"
        status_code: 200
      register: health
      retries: 10
      delay: 3
      until: health.status == 200

    - name: Confirm backend update
      ansible.builtin.debug:
        msg: "Backend updated to {{ app_version }} on {{ inventory_hostname }} ✓"
